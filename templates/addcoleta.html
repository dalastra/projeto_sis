<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Adicionar Coleta</title>

    <link rel="stylesheet" href="css/addcoleta.css">

</head>

<body>

<header>

    <a href="coleta.html" class="voltar">
        ←
    </a>

    <h1>ADICIONAR COLETA</h1>

    <img src="assets/logo.png" class="logo">

</header>

<main>

    <div class="card">

        <h2>NOME EQUIPE</h2>

        <div class="campo">

            <label>QUANTIDADE</label>

            <input type="number" placeholder="Digite a quantidade...">

        </div>

        <div class="campo">

            <label>DATA</label>

            <input type="date">

        </div>

        <div class="campo">

            <label>HORÁRIO</label>

            <input type="time">

        </div>

    </div>

    <button class="btnAdicionar">

        ADICIONAR

    </button>

</main>

</body>
</html>
